# model config
model_params:
  embed_dim: 128
  num_heads: 4
  num_layers: 1
  num_classes: 5
  pooling_head: 4
  dropout: 0.3
  max_seq_length: 1500

max_channels: 4
context: -1
seed: 42
model: "SleepEventLSTMClassifier"
dataset: "mesa"
batch_size: 16
epochs: 500
lr: 0.0001
num_workers: 2
early_stopping_patience: 50

# make sure to change this path to your local paths. Also, look at README.md for what labels_path should contain
# data_path points at the embeddings root (model_path), since fine-tuning trains on
# generated embeddings (sleepfm/checkpoints/model_base/mesa/*.hdf5), not raw EDF-derived HDF5s.
data_path: "sleepfm/checkpoints/model_base"
model_path: "sleepfm/checkpoints/model_base"
split_path: "data/mesa/dataset_split_10fold.json"
labels_path: "data/mesa/labels"
save_iter: 1000
eval_iter: 1000
log_interval: 10
accumulation_steps: 16
use_wandb: false

# dataloader configs
max_files: null
sampling_freq: 128

channel_like: ["BAS"]
